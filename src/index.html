<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DocsNexusPMS</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- //#region Edit By AI -->
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem('npms_theme');
          const isDark = savedTheme !== 'light';
          document.documentElement.classList.toggle('dark-mode-preload', isDark);
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
        } catch {
          document.documentElement.classList.add('dark-mode-preload');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <style>
      html,
      body {
        background-color: #f7f2ec;
      }

      html.dark-mode-preload,
      html.dark-mode-preload body {
        background-color: #0b1220 !important;
        color: #e8eefc;
      }
    </style>
    <!-- //#endregion Edit By AI -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
